---
seed: 1
testname: nwp_exception
pre-exec: |
  set -eu
  echo "Running pre_exec for [nwp_exception]"
  : "${MCU_REPO:?ERROR: export MCU_REPO=<path-to-caliptra-mcu-sw> (clone https://github.com/chipsalliance/caliptra-mcu-sw if needed)}"
  test -f "$MCU_REPO/Cargo.toml"
  (cd "$MCU_REPO" && cargo build --release -p network-rom \
    --target riscv32imc-unknown-none-elf --features test-exception)
  # Drop the built ELF at the convention path the Makefile expects
  # ($(NWP_TEST_DIR)/$(NWP_TESTNAME)) — mirrors the MCU pre-built-ELF pattern.
  cp "$MCU_REPO/target/riscv32imc-unknown-none-elf/release/network-rom" \
     "$CALIPTRA_SS_ROOT/src/integration/test_suites/nwp_exception/nwp_exception"
  # TESTNAME / CALIPTRA_TESTNAME are placeholders required by the Makefile;
  # the NWP-only sim consumes nwp_program.hex.
  make -f $CALIPTRA_SS_ROOT/tools/scripts/Makefile \
    TESTNAME=mcu_hello_world CALIPTRA_TESTNAME=cptra_hello_world \
    NWP_TESTNAME=nwp_exception \
    mcu_program.hex cptra_program.hex nwp_program.hex
