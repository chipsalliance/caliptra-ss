---
seed: ${PLAYBOOK_RANDOM_SEED}
testname: mci_lcc_manuf_to_non_debug
pre-exec: |
  echo "Running pre_exec for [mci_lcc_manuf_to_non_debug]"
  rm -rf otp-img.2048.vmem
  $CALIPTRA_SS_ROOT/tools/scripts/fuse_ctrl_script/gen_fuse_ctrl_vmem.py --lc-state 0 --lc-cnt 0 --seed ${PLAYBOOK_RANDOM_SEED} --lc-state-def $CALIPTRA_SS_ROOT/tools/scripts/fuse_ctrl_script/lc_ctrl_state.hjson --mmap-def $CALIPTRA_SS_ROOT/src/fuse_ctrl/data/otp_ctrl_mmap.hjson --token-configuration $CALIPTRA_SS_ROOT/src/integration/test_suites/mci_lcc_manuf_to_non_debug/test_unlock_token.hjson -o otp-img.2048.vmem
  CALIPTRA_ROOT=$CALIPTRA_SS_ROOT/third_party/caliptra-rtl make -f $CALIPTRA_SS_ROOT/third_party/caliptra-rtl/tools/scripts/Makefile CALIPTRA_INTERNAL_TRNG=0 TEST_DIR=$CALIPTRA_SS_ROOT/src/integration/test_suites/smoke_test_jtag_manuf_dbg TESTNAME=caliptra_rom_manuf_dbg program.hex
  make -f $CALIPTRA_SS_ROOT/tools/scripts/Makefile TESTNAME=mci_lcc_manuf_to_non_debug mcu_program.hex
plusargs:
  - '+CALIPTRA_SS_MANUF_DBG'
