      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/RTL/usb_dma.m.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/RTL/usb_host_dma.m.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/RTL/usb_host_pie.m.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/RTL/usb_host_reg_if.m.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/RTL/usb_host_sof_timer.m.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/RTL/usb_host_synchronizer.m.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/RTL/usb_pie.m.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/RTL/usb_reg_if.m.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/RTL/usb_rgen.m.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/RTL/usb_sie.m.vhdl
