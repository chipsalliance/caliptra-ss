# VHDL libraries are compiled in order:
#   1. usb_lib          — shared packages + ip_xxx_3511 base RTL
#   2. lib_usb_ip_3511  — ip_xxx_3511_hs high-speed wrapper
#   3. lib_usb_ip_3515  — ip_xxx_3515_hs high-speed wrapper
#   4. lib_usb_ip_3516  — ip_xxx_3516_hs_mem high-speed memory wrapper
#
# After the VHDL libraries, the SystemVerilog top-level wrapper
# (ip_xxx_3516_hs_mem_wrapper) and its AXI-to-AHB converters are compiled.
---
# --------------------------------------------------------------------------
# VHDL library: usb_lib
# Source: third_party/usb2/src/cfg/rtl_base_filelist.f
# --------------------------------------------------------------------------
provides: [usb_lib]
schema_version: 3.1.0
targets:
  rtl:
#    directories:
#      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/INTERFACE
#      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/RTL
    vhdl_files:
      # VHDL packages
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/INTERFACE/usb_general_subcmp_pkg.p.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/INTERFACE/usb_subcmp_pkg.p.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/INTERFACE/usb_fs_emb_dev_pkg.p.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/INTERFACE/usb_configuration_subcmp_pkg.p.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/INTERFACE/ip_xxx_3511.e.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/INTERFACE/ip_xxx_3511_cmp_pkg.p.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/INTERFACE/usb_cfg_pkg.p.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/INTERFACE/usb_configuration_app_cmsis_dap_jtag_pkg.p.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/INTERFACE/usb_ep_config_hub_cmsis_dap_jtag_pkg.p.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/INTERFACE/usb_ep_config_pkg.p.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/INTERFACE/usb_fs_hub_pkg.p.vhdl
      # VHDL RTL
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/RTL/usb_ahb_master.m.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/RTL/usb_ahb_slave.m.vhdl
