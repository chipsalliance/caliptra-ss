      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/RTL/usb_tx_sf_dpdm.m.vhdl
      - $COMPILE_ROOT/../../third_party/usb2/src/ip_xxx_3511/RTL/usb_upstreamled.m.vhdl
